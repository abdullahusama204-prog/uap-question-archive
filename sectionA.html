<!DOCTYPE html>
<html>

<head>

<title>Section A Questions</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Section A Questions</h1>

<div class="question-gallery">

<!-- নতুন image সবসময় উপরে add করবে -->

<img src="images/question1.JPG" onclick="openImage(this)">

</div>

<div class="viewer" id="viewer">

<img id="fullImage">

<br><br>

<a id="downloadLink" download>

<button class="download-btn">

⬇ Download Question

</button>

</a>

</div>

<script>

let scale=1;

function openImage(img){

document.getElementById("viewer").style.display="flex";

document.getElementById("fullImage").src=img.src;

document.getElementById("downloadLink").href=img.src;

scale=1;

document.getElementById("fullImage").style.transform="scale(1)";

}

document.getElementById("viewer").addEventListener("wheel",function(e){

e.preventDefault();

if(e.deltaY<0){

scale+=0.1;

}

else{

scale-=0.1;

}

if(scale<1){

scale=1;

}

document.getElementById("fullImage").style.transform="scale("+scale+")";

});

document.getElementById("viewer").onclick=function(e){

if(e.target.id=="viewer"){

this.style.display="none";

}

}

</script>

</body>

</html>
