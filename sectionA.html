<!DOCTYPE html>
<html>

<head>

<title>Section A Questions</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Section A Questions</h1>

<div class="question-gallery">

<img src="images/question1.JPG" onclick="openImage(this)">

<img src="images/question2.JPG" onclick="openImage(this)">

<img src="images/question3.JPG" onclick="openImage(this)">

<img src="images/question4.JPG" onclick="openImage(this)">

</div>

<div class="viewer" id="viewer">

<img id="fullImage">

<a id="downloadLink">

<button class="download-btn">

Download Question

</button>

</a>

</div>

<script>

function openImage(img){

document.getElementById("viewer").style.display="flex";

document.getElementById("fullImage").src=img.src;

document.getElementById("downloadLink").href=img.src;

}

document.getElementById("viewer").onclick=function(){

this.style.display="none";

}

</script>

</body>

</html>
