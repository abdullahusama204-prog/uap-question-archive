<!DOCTYPE html>
<html>

<head>

<title>Section A Questions</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Section A Questions</h1>

<div class="question-gallery" id="gallery">

<img src="images/question1.JPG" onclick="openImage(this)">

</div>

<div>

<button onclick="prevPage()">⬅ Previous</button>

<button onclick="nextPage()">Next ➡</button>

</div>
<!-- নতুন image সবসময় উপরে add করবে -->

<img src="images/question1.JPG" onclick="openImage(this)">

</div>

<div class="viewer" id="viewer">

<img id="fullImage">

<br><br>

<a id="downloadLink" download>

<button class="download-btn">

⬇ Download Question

</button>

</a>

</div>

<script>

let scale=1;

function openImage(img){

document.getElementById("viewer").style.display="flex";

document.getElementById("fullImage").src=img.src;

document.getElementById("downloadLink").href=img.src;

scale=1;

document.getElementById("fullImage").style.transform="scale(1)";

}

document.getElementById("viewer").addEventListener("wheel",function(e){

e.preventDefault();

if(e.deltaY<0){

scale+=0.1;

}

else{

scale-=0.1;

}

if(scale<1){

scale=1;

}

document.getElementById("fullImage").style.transform="scale("+scale+")";

});

document.getElementById("viewer").onclick=function(e){

if(e.target.id=="viewer"){

this.style.display="none";

}

}
<script>

let imagesPerPage=16;

let currentPage=1;

let gallery=document.getElementById("gallery");

let images=gallery.getElementsByTagName("img");

function showPage(){

let start=(currentPage-1)*imagesPerPage;

let end=start+imagesPerPage;

for(let i=0;i<images.length;i++){

if(i>=start && i<end){

images[i].style.display="block";

}

else{

images[i].style.display="none";

}

}

}

function nextPage(){

let totalPages=Math.ceil(images.length/imagesPerPage);

if(currentPage<totalPages){

currentPage++;

showPage();

}

}

function prevPage(){

if(currentPage>1){

currentPage--;

showPage();

}

}

showPage();
let startDistance=0;

document.getElementById("viewer").addEventListener("touchstart",function(e){

if(e.touches.length==2){

let dx=e.touches[0].clientX-e.touches[1].clientX;

let dy=e.touches[0].clientY-e.touches[1].clientY;

startDistance=Math.sqrt(dx*dx+dy*dy);

}

});

document.getElementById("viewer").addEventListener("touchmove",function(e){

if(e.touches.length==2){

e.preventDefault();

let dx=e.touches[0].clientX-e.touches[1].clientX;

let dy=e.touches[0].clientY-e.touches[1].clientY;

let currentDistance=Math.sqrt(dx*dx+dy*dy);

if(currentDistance>startDistance){

scale+=0.03;

}
else{

scale-=0.03;

}

if(scale<1){

scale=1;

}

document.getElementById("fullImage").style.transform="scale("+scale+")";

startDistance=currentDistance;

}

});

</script>

</script>

</body>

</html>
